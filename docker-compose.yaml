services: 
    redis: 
        image: redis
    
    backend: 
        image: backend-app
    
        environment: 
            - REQUEST_ORIGIN=http://localhost:8000
            - REDIS_HOST=redis
            - POSTGRES_HOST=db
            - POSTGRES_USER=mahdi
            - POSTGRES_PASSWORD=secret
            - POSTGRES_DATABASE=my_database

    frontend: 
        image: frontend-app 

    db: 
        image: postgres:18
        restart: unless-stopped
        environment: 
            - POSTGRES_PASSWORD=secret
            - POSTGRES_USER=mahdi
            - POSTGRES_DB=my_database
        volumes:
            - ./database:/var/lib/postgresql/18/docker
            
    nginx: 
        image: nginx
        ports: 
            - 8000:80
        volumes: 
            - ./nginx.conf:/etc/nginx/nginx.conf
        depends_on: 
            - frontend
            - backend
            

         
    
            

            
   
            
     